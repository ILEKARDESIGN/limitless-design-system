<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>LIMITLESS ∞ Confirm Modal</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700;900&family=Barlow+Condensed:wght@900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../css/limitless.css">
<style>
body { padding: 20px; }
.demo-section { margin-bottom: 32px; }
.demo-label { font-family: 'JetBrains Mono', monospace; font-size: 8px; font-weight: 700; letter-spacing: .16em; text-transform: uppercase; color: var(--lx-txl); margin-bottom: 10px; }
.demo-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-start; margin-bottom: 16px; }

</style>
</head>
<body>

<div class="demo-section">
  <div class="demo-label">CONFIRM MODAL</div>
  <div style="position:relative;height:300px;background:rgba(0,0,0,.4);border-radius:var(--r-md);display:flex;align-items:center;justify-content:center">
    <div style="background:var(--lx-card);border-radius:var(--r-lg);padding:28px;max-width:400px;width:100%;box-shadow:var(--sh-hv)">
      <div class="lx-clg" style="margin-bottom:4px">Confirm Action</div>
      <div class="lx-bsm cm" style="margin-bottom:20px">Are you sure you want to submit this plan review? This action cannot be undone.</div>
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button class="lx-btn out">Cancel</button>
        <button class="lx-btn pri">Confirm</button>
      </div>
    </div>
  </div>
</div>

<script src="../../js/core.js"></script>

</body>
</html>
