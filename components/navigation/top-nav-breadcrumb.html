<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>LIMITLESS ∞ Top Nav & Breadcrumb</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700;900&family=Barlow+Condensed:wght@900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../css/limitless.css">
<style>
body { padding: 20px; }
.demo-section { margin-bottom: 32px; }
.demo-label { font-family: 'JetBrains Mono', monospace; font-size: 8px; font-weight: 700; letter-spacing: .16em; text-transform: uppercase; color: var(--lx-txl); margin-bottom: 10px; }
.demo-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-start; margin-bottom: 16px; }

</style>
</head>
<body>
<!-- Component: Top Nav & Breadcrumb | Category: Navigation -->

<div class="demo-section">
  <div class="demo-label">TOP NAV BAR (.lx-tnav)</div>
  <div class="lx-tnav">
    <a class="lx-tni active">Dashboard</a>
    <a class="lx-tni">Participants</a>
    <span class="lx-tnsep"></span>
    <a class="lx-tni">Budget</a>
    <a class="lx-tni">Reports</a>
    <a class="lx-tni">Settings</a>
  </div>
</div>

<div class="demo-section">
  <div class="demo-label">BREADCRUMB (.lx-bc)</div>
  <div class="lx-bc">
    <span class="lx-bci">Home</span>
    <span class="lx-bcs">›</span>
    <span class="lx-bci">Participants</span>
    <span class="lx-bcs">›</span>
    <span class="lx-bci">Iona Karamacoski</span>
    <span class="lx-bcs">›</span>
    <span class="lx-bci cur">Budget Overview</span>
  </div>
</div>

<script src="../../js/core.js"></script>
</body>
</html>
