<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>LIMITLESS ∞ Error State</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700;900&family=Barlow+Condensed:wght@900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../css/limitless.css">
<style>
body { padding: 20px; }
.demo-section { margin-bottom: 32px; }
.demo-label { font-family: 'JetBrains Mono', monospace; font-size: 8px; font-weight: 700; letter-spacing: .16em; text-transform: uppercase; color: var(--lx-txl); margin-bottom: 10px; }
.demo-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-start; margin-bottom: 16px; }

</style>
</head>
<body>

<div class="demo-section">
  <div class="demo-label">ERROR STATE</div>
  <div class="lx-card" style="max-width:400px;text-align:center;padding:40px;border-color:rgba(255,45,125,.2)">
    <div style="font-size:48px;margin-bottom:12px">⚠️</div>
    <div class="lx-clg cpk" style="margin-bottom:4px">Something Went Wrong</div>
    <div class="lx-bsm cm" style="margin-bottom:16px">We couldn't load the participant data. Please try again or contact support.</div>
    <div style="display:flex;gap:8px;justify-content:center">
      <button class="lx-btn pri">Retry</button>
      <button class="lx-btn out">Contact Support</button>
    </div>
  </div>
</div>

<script src="../../js/core.js"></script>

</body>
</html>
