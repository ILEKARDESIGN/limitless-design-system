<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>LIMITLESS ∞ Toast Notifications</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700;900&family=Barlow+Condensed:wght@900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../css/limitless.css">
<style>
body { padding: 20px; }
.demo-section { margin-bottom: 32px; }
.demo-label { font-family: 'JetBrains Mono', monospace; font-size: 8px; font-weight: 700; letter-spacing: .16em; text-transform: uppercase; color: var(--lx-txl); margin-bottom: 10px; }
.demo-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-start; margin-bottom: 16px; }

</style>
</head>
<body>

<div class="demo-section">
  <div class="demo-label">TOAST NOTIFICATION — 4 VARIANTS (CLICK TO TRIGGER)</div>
  <div class="demo-row">
    <button class="lx-btn pk" onclick="showToast('suc','Success','Record saved','Participant data has been updated successfully')">Success Toast</button>
    <button class="lx-btn or" onclick="showToast('wrn','Warning','Budget Alert','Transport budget has exceeded 85% utilization')">Warning Toast</button>
    <button class="lx-btn cy" onclick="showToast('inf','Info','Sync Complete','All service agreements have been synchronised')">Info Toast</button>
    <button class="lx-btn pk" style="background:var(--lx-pink)" onclick="showToast('err','Error','Connection Failed','Could not reach NDIS API. Please retry.')">Error Toast</button>
  </div>
  <div id="toast-stack" style="position:fixed;top:72px;right:16px;z-index:1100;display:flex;flex-direction:column;gap:8px;pointer-events:none"></div>
</div>

<div class="demo-section">
  <div class="demo-label">TOAST ANATOMY (STATIC PREVIEW)</div>
  <div style="max-width:340px">
    <div style="background:var(--lx-black);color:var(--lx-offwhite);border-radius:var(--r-md);overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.3)">
      <div style="padding:12px 14px;display:flex;gap:10px;align-items:flex-start">
        <div style="width:20px;height:20px;border-radius:50%;background:var(--lx-yellow);color:var(--lx-black);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0">✓</div>
        <div style="flex:1">
          <div style="font-family:Barlow Condensed,sans-serif;font-weight:900;font-size:12px;text-transform:uppercase;letter-spacing:.06em;margin-bottom:1px">Success</div>
          <div style="font-size:10px;color:rgba(245,240,232,.65);line-height:1.4">Action completed successfully</div>
        </div>
        <div style="width:18px;height:18px;border-radius:50%;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:10px;color:rgba(245,240,232,.6);cursor:pointer">✕</div>
      </div>
      <div style="height:3px;background:rgba(255,255,255,.08)"><div style="height:100%;width:65%;background:var(--lx-yellow)"></div></div>
    </div>
  </div>
</div>

<script src="../../js/core.js"></script>
<script>
function showToast(type, title, subtitle, msg) {
  const stack = document.getElementById('toast-stack');
  const icons = {suc:'✓', wrn:'⚠', inf:'ℹ', err:'✕'};
  const t = document.createElement('div');
  t.style.cssText = 'background:var(--lx-black);color:var(--lx-offwhite);border-radius:var(--r-md);min-width:280px;max-width:340px;pointer-events:all;transform:translateX(120%);opacity:0;transition:transform .4s var(--spring),opacity .3s;box-shadow:0 8px 32px rgba(0,0,0,.3);overflow:hidden';
  const colors = {suc:'var(--lx-yellow)',wrn:'var(--lx-orange)',inf:'var(--lx-cyan)',err:'var(--lx-pink)'};
  const fgc = {suc:'var(--lx-black)',wrn:'#fff',inf:'var(--lx-black)',err:'#fff'};
  t.innerHTML = `<div style="padding:12px 14px;display:flex;gap:10px;align-items:flex-start"><div style="width:20px;height:20px;border-radius:50%;background:${colors[type]};color:${fgc[type]};display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0">${icons[type]}</div><div style="flex:1"><div style="font-family:Barlow Condensed,sans-serif;font-weight:900;font-size:12px;text-transform:uppercase;letter-spacing:.06em;margin-bottom:1px">${title}</div><div style="font-size:10px;color:rgba(245,240,232,.65);line-height:1.4">${msg||subtitle}</div></div></div><div style="height:3px;background:rgba(255,255,255,.08)"><div class="tp" style="height:100%;width:100%;background:${colors[type]};transition:width 3s linear"></div></div>`;
  stack.appendChild(t);
  requestAnimationFrame(()=>{t.style.transform='translateX(0)';t.style.opacity='1';setTimeout(()=>{const p=t.querySelector('.tp');if(p)p.style.width='0'},50)});
  setTimeout(()=>{t.style.transform='translateX(120%)';t.style.opacity='0';setTimeout(()=>t.remove(),400)},3500);
}
</script>
</body>
</html>
